<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NINJA Slideshow</title>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000; color: #fff;
      overflow: hidden; font-family: sans-serif;
    }
    #slide {
      width: 100%; height: 100%;
      object-fit: contain;
      position: absolute; top: 0; left: 0;
      transition: opacity 1s ease;
    }
    #slide.hidden { opacity: 0; }
    .spinner {
      position: absolute; top: 50%; left: 50%;
      width: 48px; height: 48px;
      margin: -24px 0 0 -24px;
      border: 4px solid #333; border-top-color: #e00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status {
      position: absolute; top: 8px; right: 8px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #f00;
    }
    #status.connected { background: #0f0; }
    #msg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px; color: #888;
    }
  </style>
</head>
<body>
  <div id="spinner" class="spinner"></div>
  <div id="msg" style="display:none">No content available</div>
  <div id="status"></div>

  <script>
    (function () {
      var SERVER_URL = "https://slideshow.ninja.com.mx";
      var IMAGE_DURATION = 15000;
      var FADE_MS = 1000;
      var LOOPS_BEFORE_RELOAD = 3;

      var files = [];
      var idx = 0;
      var loopCount = 0;
      var activeEl = null;
      var timer = null;
      var socket = null;

      var container = document.body;
      var spinner = document.getElementById("spinner");
      var msg = document.getElementById("msg");
      var statusDot = document.getElementById("status");

      function isVideo(type) {
        return type === ".mp4" || type === ".webm";
      }

      function releaseElement(el) {
        if (!el) return;
        if (el.tagName === "VIDEO") {
          el.onended = null;
          el.onloadeddata = null;
          el.onerror = null;
          el.pause();
          el.removeAttribute("src");
          el.load();
        }
        el.onload = null;
        el.onerror = null;
        if (el.parentNode) el.parentNode.removeChild(el);
      }

      function showSlide() {
        if (!files.length) {
          msg.style.display = "";
          spinner.style.display = "none";
          return;
        }
        msg.style.display = "none";
        var file = files[idx];
        var el;

        if (isVideo(file.type)) {
          el = document.createElement("video");
          el.src = file.url;
          el.autoplay = true;
          el.muted = true;
          el.setAttribute("playsinline", "");
          el.id = "slide";
          el.className = "hidden";
          el.onloadeddata = function () {
            spinner.style.display = "none";
            el.className = "";
          };
          el.onended = function () { advance(); };
          el.onerror = function () { advance(); };
        } else {
          el = document.createElement("img");
          el.src = file.url;
          el.alt = file.name;
          el.id = "slide";
          el.className = "hidden";
          el.onload = function () {
            spinner.style.display = "none";
            el.className = "";
            timer = setTimeout(advance, IMAGE_DURATION);
          };
          el.onerror = function () { advance(); };
        }

        var old = activeEl;
        if (old) old.className = "hidden";
        container.appendChild(el);
        activeEl = el;
        if (old) {
          setTimeout(function () { releaseElement(old); }, FADE_MS + 100);
        }
      }

      function advance() {
        if (timer) { clearTimeout(timer); timer = null; }
        if (activeEl && activeEl.tagName === "VIDEO") {
          activeEl.onended = null;
          activeEl.pause();
        }
        idx = (idx + 1) % files.length;
        if (idx === 0) {
          loopCount++;
          if (loopCount >= LOOPS_BEFORE_RELOAD) {
            window.location.reload();
            return;
          }
        }
        spinner.style.display = "";
        showSlide();
      }

      function fetchFiles() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", SERVER_URL + "/api/files");
        xhr.timeout = 15000;
        xhr.onload = function () {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              var changed = JSON.stringify(data.map(function(f){return f.name;})) !==
                            JSON.stringify(files.map(function(f){return f.name;}));
              files = data;
              if (changed) {
                idx = 0;
                loopCount = 0;
                releaseElement(activeEl);
                activeEl = null;
                showSlide();
              }
            } catch (e) {}
          }
        };
        xhr.send();
      }

      function connectSocket() {
        try {
          socket = io(SERVER_URL, { transports: ["websocket", "polling"] });
          socket.on("connect", function () {
            statusDot.className = "connected";
          });
          socket.on("disconnect", function () {
            statusDot.className = "";
          });
          socket.on("filesUpdated", function () {
            fetchFiles();
          });
        } catch (e) {
          setInterval(fetchFiles, 30000);
        }
      }

      // Prevent screen saver (Tizen specific)
      try {
        if (typeof tizen !== "undefined" && tizen.power) {
          tizen.power.request("SCREEN", "SCREEN_NORMAL");
        }
      } catch (e) {}

      // Handle Tizen remote back button
      document.addEventListener("keydown", function (e) {
        if (e.keyCode === 10009) { // TizenKey BACK
          try { tizen.application.getCurrentApplication().exit(); } catch (ex) {}
        }
      });

      fetchFiles();
      connectSocket();
      setInterval(function () {
        if (!socket || !socket.connected) fetchFiles();
      }, 60000);
    })();
  </script>
</body>
</html>
